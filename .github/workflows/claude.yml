name: Claude Code

on:
  # 이슈/PR/리뷰 코멘트에 @claude 멘션 시 작동
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  # 수동 실행 (gh workflow run claude.yml -f direct_prompt="...")
  workflow_dispatch:
    inputs:
      direct_prompt:
        description: '작업 지시 (Claude에게 직접 전달)'
        required: true
        type: string

jobs:
  claude:
    # 멘션이 있을 때만 실행 (워크플로 디스패치는 항상 실행)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 파일 편집 + 푸시
      pull-requests: write  # PR 생성/코멘트
      issues: write         # 이슈 코멘트
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 디스패치 모드: direct_prompt 입력 사용 (claude-code-action@beta 스펙)
          direct_prompt: ${{ github.event.inputs.direct_prompt || '' }}
          # 자동 허용할 도구 (위험한 것은 제외)
          allowed_tools: |
            Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(node:*),
            Read,Write,Edit,Glob,Grep,WebFetch,WebSearch
          # 브랜치 접두: 기본 "claude/" 대신 의미있는 영문 prefix 사용
          # → 작업 유형별로 docs/, feat/, fix/ 접두가 나오도록 custom_instructions에서 지시
          branch_prefix: 'work/'
          # 커밋·브랜치 네이밍 규칙 + 문서 규칙 주입
          custom_instructions: |
            ## 브랜치 네이밍 규칙 (반드시 준수)
            - 기본 접두 `work/`는 적절하지 않으니 작업 성격에 맞게 변경:
              - 문서만 변경 → `docs/<의미있는-kebab-case>` (예: `docs/sheet-architecture`)
              - 새 기능 → `feat/<의미있는-kebab-case>` (예: `feat/meeting-results-ui`)
              - 버그 수정 → `fix/<의미있는-kebab-case>` (예: `fix/stepper-spinner`)
              - 리팩터링 → `refactor/<...>`
            - 이슈 번호/타임스탬프를 브랜치명에 넣지 말 것
            - 영문 kebab-case, 뒷부분은 2~5 단어로 의미 파악 가능하게
            - 이슈 본문에 "브랜치명: ..." 지시가 있으면 그것을 최우선 채택

            ## 문서 작성 규칙
            - 모든 `.md` 문서 맨 위에 "📄 이 문서는 무엇인가요?" 요약 카드 포함
            - 디자인 변경 시 docs/design/tokens.md, components.md, preview.html 동기화
            - CLAUDE.md의 규칙을 위반하지 말 것 (6.5 문서·디자인 규칙, 2.5 MVP 스코프)
        env:
          # 시트 접근이 필요할 때 사용 (선택)
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
