<!DOCTYPE html>
<html lang="ko">
<!-- Design: 캘린더 탭 v3 (셀 미팅 정보 표시 + DB관리 아이콘 카트) -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>캘린더 · 세일즈PT 영업일지</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  * { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #f8fafc; margin: 0; padding: 0; }

  /* ── 채널 배지 (components.md 정의 그대로) ─────────── */
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .badge-purchase { background: #dbeafe; color: #1d4ed8; }
  .badge-direct   { background: #dcfce7; color: #16a34a; }
  .badge-banner   { background: #fef3c7; color: #d97706; }
  .badge-referral { background: #f3e8ff; color: #7c3aed; }

  /* ── 캘린더 셀 (1:1.7 세로 직사각형, 미팅 핀 3개 + 날짜 동그라미 수용) ─────────── */
  .cal-cell {
    aspect-ratio: 1 / 1.7;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 4px 3px 3px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    position: relative;
    background: white;
    overflow: hidden;
  }
  .cal-cell:active { transform: scale(0.96); }
  .cal-cell:hover:not(.is-selected) { background: #f8fafc; }

  /* 다른 달 (월 그리드 채우기용) — 살짝만 보임 */
  .cal-cell.other-month {
    cursor: default;
    pointer-events: none;
    opacity: 0.25;
    background: transparent;
  }

  /* 날짜 숫자 (오늘은 파란 배경 동그라미) */
  .date-num {
    font-size: 12px; font-weight: 600;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: #374151;
    flex-shrink: 0;
  }
  .cal-cell.is-sun .date-num { color: #ef4444; }
  .cal-cell.is-sat .date-num { color: #ef4444; }
  .cal-cell.other-month .date-num { color: #d1d5db; }

  /* 오늘 — 파란 배경 동그라미 */
  .cal-cell.is-today .date-num {
    background: #3b82f6;
    color: white;
    font-weight: 700;
    box-shadow: 0 2px 5px rgba(59, 130, 246, 0.35);
  }

  /* 선택된 날짜 — 강조 (오늘과 중첩 시 둘 다 보이게) */
  .cal-cell.is-selected {
    background: #eff6ff;
    outline: 2px solid #3b82f6;
    outline-offset: -2px;
    z-index: 2;
  }

  /* ── 미팅 박스 (시간 + 업체명) — 셀 안 표시 ─────────── */
  .meeting-pill {
    font-size: 9px;
    line-height: 1.2;
    padding: 1px 3px;
    border-radius: 2px;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: left;
    letter-spacing: -0.2px;
  }
  .meeting-pill .pill-time {
    font-weight: 700;
    margin-right: 2px;
  }
  .meeting-pill.ch-purchase  { background: #dbeafe; color: #1d4ed8; }
  .meeting-pill.ch-direct    { background: #dcfce7; color: #15803d; }
  .meeting-pill.ch-banner    { background: #fef3c7; color: #b45309; }
  .meeting-pill.ch-referral  { background: #f3e8ff; color: #7c3aed; }

  .meeting-more {
    font-size: 9px;
    font-weight: 600;
    color: #6b7280;
    text-align: center;
    margin-top: 2px;
    line-height: 1.2;
    width: 100%;
  }

  /* 요일 헤더 — sticky로 페이지 배너 아래 고정 */
  .day-header-bar {
    background: #f1f5f9;
    border-bottom: 1px solid #cbd5e1;
    padding: 8px 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .day-header {
    text-align: center;
    font-size: 11px; font-weight: 700;
    padding: 4px 0;
    color: #64748b;
    letter-spacing: 0.5px;
  }
  .day-header.is-weekend { color: #ef4444; }

  /* ── 미팅 카드 상태별 스타일 (schedule-weekly v2와 통일) ─────────── */
  .card-reserved    { background: #fffbeb; border-left: 4px solid #fbbf24; }
  .card-contract    { background: #dcfce7; border-left: 4px solid #16a34a;
                      box-shadow: 0 1px 4px rgba(22, 163, 74, 0.12); }
  .card-done        { background: #fff7ed; border-left: 4px solid #fb923c; }
  .card-rescheduled { background: #faf5ff; border-left: 4px solid #a855f7; opacity: 0.85; }
  .card-canceled    { background: #fef2f2; border-left: 4px solid #ef4444; opacity: 0.72; }
  .canceled-text    { text-decoration: line-through; color: #9ca3af; }

  /* ── 고정 영역 ─────────── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
  .content-area { padding-bottom: 76px; }

  /* ── 토스트 ─────────── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(17, 24, 39, 0.95); color: white;
    padding: 10px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    z-index: 100; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }

  /* ── 페이드 인 ─────────── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.2s ease; }

  /* 비활성 버튼 */
  button:disabled { cursor: not-allowed; }

  /* ====== [v6] 주별 펼침 영역 — 디자인 강화 ====== */
  .week-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 3px;
    position: relative;
  }
  /* 주와 주 사이 간격 — 좌우 셀 간격(3px)과 동일하게 */
  .cal-week {
    margin-bottom: 3px;
  }
  .cal-week:last-child {
    margin-bottom: 0;
  }
  /* 펼침이 열려있는 주는 펼침 영역의 margin이 갭 역할을 하므로 cal-week 마진 제거 */
  .cal-week:has(.week-expand.open) {
    margin-bottom: 0;
  }
  .week-expand {
    overflow: hidden;
    max-height: 0;
    transform: translateY(-8px);
    transform-origin: top center;
    transition: max-height 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.4s ease,
                margin 0.5s ease,
                padding 0.45s ease,
                border-width 0.3s ease,
                transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    opacity: 0;
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #eff6ff 0%, #f0f9ff 100%);
    border-radius: 12px;
    border: 0 solid #3b82f6;
    position: relative;
  }
  .week-expand.open {
    max-height: 1500px;
    transform: translateY(0);
    opacity: 1;
    margin: 6px 0 10px 0;
    padding: 14px 12px 12px;
    border-width: 2px;        /* 사면 모두 동일 두께 */
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.12);
  }
  /* 선택된 셀에서 박스로 이어지는 ▲ 커넥터 */
  .week-expand.open::before {
    content: '';
    position: absolute;
    top: -8px;
    left: var(--connector-x, 50%);
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid #3b82f6;
    transition: left 0.3s ease;
  }
  .week-expand.open::after {
    content: '';
    position: absolute;
    top: -5px;
    left: var(--connector-x, 50%);
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 7px solid #eff6ff;
    transition: left 0.3s ease;
  }
  .expand-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  /* 펼침 박스 내부 콘텐츠 — 박스 열림에 0.1s 지연으로 fade-in (위→아래 방향성 강화) */
  .week-expand > * {
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.35s ease 0s, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0s;
  }
  .week-expand.open > * {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.15s;
  }
  .expand-date-label {
    font-size: 13px; font-weight: 700; color: #111827;
  }
  .expand-period-label {
    font-size: 11px; color: #9ca3af; margin-top: 1px;
  }
  .expand-count {
    font-size: 11px; color: #6b7280;
  }

  /* 미팅 미니 카드 — 클릭 시 비고 인라인 펼침 */
  .mini-card {
    cursor: pointer;
    transition: background 0.15s;
  }
  .mini-card:hover { filter: brightness(0.97); }
  .mini-note {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                padding 0.4s ease,
                margin 0.4s ease;
    background: white;
    border-radius: 6px;
  }
  .mini-note.open {
    max-height: 200px;
    padding: 8px 10px;
    margin-top: 6px;
    border: 1px solid #e5e7eb;
  }
  .mini-note-label {
    font-size: 10px; color: #9ca3af; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .mini-note-text {
    font-size: 12px; color: #374151;
    line-height: 1.5; white-space: pre-wrap;
  }
  .mini-note-empty {
    font-size: 12px; color: #9ca3af; font-style: italic;
  }

  /* 펼침 영역 안의 일정·계약 이동 버튼 */
  .expand-go-btn {
    width: 100%;
    padding: 9px 0;
    font-size: 13px; font-weight: 600;
    color: #1d4ed8; background: #eff6ff;
    border: 1px solid #bfdbfe; border-radius: 8px;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .expand-go-btn:hover:not(:disabled) { background: #dbeafe; }
  .expand-go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

</style>
</head>

  { id: 'm13', 미팅날짜: '2026-04-27', 미팅시간: '17:00', channel: '매입DB',   업체명: 'E업체', 장소: '광진', 상태: '예약', 수임비: 0, 예약비고: '계약서 초안 미리 메일로 송부 요청.' },
  // 5월 — 다음 달 미리보기용
  { id: 'm15', 미팅날짜: '2026-05-04', 미팅시간: '10:00', channel: '직접생산', 업체명: '○○호프', 장소: '신촌', 상태: '예약', 수임비: 0, 예약비고: '동네 인근 신규 출점 검토 중.' },
];

/* ============================================================
   상태
   ============================================================ */
let currentMonth = { year: TODAY.getFullYear(), month: TODAY.getMonth() }; // month는 0~11
let selectedDate = fmtISODate(TODAY);

/* ============================================================
   유틸: 날짜 계산
   ============================================================ */
function addDaysPure(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function fmtISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function fromISODate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtMD(date) {
  return `${date.getMonth() + 1}월 ${date.getDate()}일`;
}

function isToday(date) {
  return fmtISODate(date) === fmtISODate(TODAY);
}

function isSameMonth(date, year, month) {
  return date.getFullYear() === year && date.getMonth() === month;
}

/* 편집 가능 기간 내인지 확인 (수강시작일 ~ 수강시작일+69일) */
function isInEditPeriod(date) {
  const t = date.getTime();
  return t >= COURSE_START.getTime() && t <= EDIT_END.getTime();
}

/* 수강시작일 기준 주차 (1~10) */
function getWeekNumber(date) {
  const diff = Math.floor((date - COURSE_START) / 86400000);
  if (diff < 0) return 0;
  return Math.floor(diff / 7) + 1;
}

/* 주차 라벨 */
function getWeekLabel(date) {
  if (date.getTime() < COURSE_START.getTime()) return '수강 시작 전';
  if (date.getTime() > EDIT_END.getTime())     return '수강 완료';
  const w = getWeekNumber(date);
  if (w >= 9 && w <= 10) return `${w}주차 · 📌 마감 유예`;
  return `${w}주차`;
}

/* HTML 이스케이프 */
function escHtml(v) {
  return (v || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ============================================================
   렌더: 캘린더 그리드 (6주 × 7일 = 42칸)
   ============================================================ */
function renderCalendar() {
  // 월 라벨
  document.getElementById('month-label').textContent =
    `${currentMonth.year}년 ${currentMonth.month + 1}월`;

  // 월 네비 활성/비활성
  updateMonthNavState();

  // 주별 그리드 생성 (4~6주, 그 달의 1일이 속한 주 ~ 마지막 날이 속한 주만)
  const wrapper = document.getElementById('cal-weeks');
  wrapper.innerHTML = '';

  const firstDay = new Date(currentMonth.year, currentMonth.month, 1);
  const lastDay  = new Date(currentMonth.year, currentMonth.month + 1, 0); // 그 달 마지막 날
  const startWeekday = firstDay.getDay();          // 1일의 요일
  const gridStart = addDaysPure(firstDay, -startWeekday);  // 1일이 속한 주의 일요일
  const lastWeekday = lastDay.getDay();
  const gridEnd   = addDaysPure(lastDay, 6 - lastWeekday); // 마지막 날이 속한 주의 토요일

  // 총 주수 계산 (gridStart ~ gridEnd)
  const totalDays = Math.round((gridEnd - gridStart) / 86400000) + 1;
  const totalWeeks = Math.round(totalDays / 7);

  for (let w = 0; w < totalWeeks; w++) {
    // 주 wrapper
    const weekDiv = document.createElement('div');
    weekDiv.className = 'cal-week';

    // 7개 셀 행
    const row = document.createElement('div');
    row.className = 'week-row';

    // 이 주에 selectedDate가 있는지 검사
    let weekHasSelected = false;
    let weekSelectedDow = 0;

    for (let d = 0; d < 7; d++) {
      const i = w * 7 + d;
      const cellDate = addDaysPure(gridStart, i);
      const isoDate = fmtISODate(cellDate);
      const inMonth = isSameMonth(cellDate, currentMonth.year, currentMonth.month);
      const today = isToday(cellDate);
      const selected = isoDate === selectedDate;
      const dow = cellDate.getDay();

      const cell = document.createElement('div');
      cell.className = 'cal-cell';

      if (!inMonth) {
        cell.classList.add('other-month');
      }
      if (today) cell.classList.add('is-today');
      if (selected && inMonth) {
        cell.classList.add('is-selected');
        weekHasSelected = true;
        weekSelectedDow = d; // 펼침 커넥터 위치용
      }
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');

      // 미팅 박스 (같은 달일 때만, 변경/취소 제외)
      let pillsHTML = '';
      if (inMonth) {
        const dayMeetings = meetings
          .filter(m => m.미팅날짜 === isoDate)
          .filter(m => !['변경', '취소'].includes(m.상태))
          .sort((a, b) => a.미팅시간.localeCompare(b.미팅시간));

        const visible = Math.min(dayMeetings.length, 3);
        for (let j = 0; j < visible; j++) {
          const m = dayMeetings[j];
          const cls = PILL_CLASS[m.channel];
          const company = escHtml(m.업체명);
          pillsHTML += `<div class="meeting-pill ${cls}"><span class="pill-time">${m.미팅시간}</span>${company}</div>`;
        }
        if (dayMeetings.length > 3) {
          pillsHTML += `<div class="meeting-more">+${dayMeetings.length - 3}</div>`;
        }
      }

      cell.innerHTML = `<div class="date-num">${cellDate.getDate()}</div>${pillsHTML}`;

      if (inMonth) {
        cell.onclick = () => selectDate(isoDate);
      }

      row.appendChild(cell);
    }

    weekDiv.appendChild(row);

    // 주별 펼침 영역 — 이 주에 selected 날짜가 있을 때만 콘텐츠 채워서 open
    const expand = document.createElement('div');
    expand.className = 'week-expand';
    if (weekHasSelected && selectedDate) {
      expand.classList.add('open');
      // 커넥터 화살표 X좌표 = 선택된 셀의 가로 중심 (7등분, 각 셀 중앙)
      const connectorX = ((weekSelectedDow + 0.5) / 7) * 100;
      expand.style.setProperty('--connector-x', `${connectorX}%`);
      expand.innerHTML = renderExpandContent(selectedDate);
    }
    weekDiv.appendChild(expand);

    wrapper.appendChild(weekDiv);
  }
}

/* 월 네비 활성/비활성 갱신 — 수강 기간 제한 없음, 항상 활성 */
function updateMonthNavState() {
  // 수강 전후 제한 제거됨. 화살표는 항상 활성.
}

/* ============================================================
   렌더: 선택된 날짜 미팅 요약 (모든 상태 표시)
   ============================================================ */
function renderExpandContent(isoDate) {
  const date = fromISODate(isoDate);
  const dayKo = DAY_KO[date.getDay()];
  const todayMark = isToday(date) ? ' — 오늘' : '';

  // 모든 상태 다 표시 (변경/취소 포함)
  const dayMeetings = meetings
    .filter(m => m.미팅날짜 === isoDate)
    .sort((a, b) => a.미팅시간.localeCompare(b.미팅시간));

  const headerHTML = `
    <div class="expand-header">
      <div>
        <div class="expand-date-label">${fmtMD(date)} (${dayKo})${todayMark}</div>
        <div class="expand-period-label">${getWeekLabel(date)}</div>
      </div>
      <span class="expand-count">${dayMeetings.length > 0 ? dayMeetings.length + '건' : '미팅 없음'}</span>
    </div>
  `;

  let listHTML;
  if (dayMeetings.length === 0) {
    listHTML = `
      <div class="bg-white rounded-xl px-4 py-4 text-center border border-dashed border-blue-200">
        <div class="text-xs text-gray-400">선택한 날짜에 미팅이 없습니다</div>
      </div>
    `;
  } else {
    listHTML = `<div class="space-y-1.5">${dayMeetings.map((m, i) => renderMeetingMini(m, isoDate, i)).join('')}</div>`;
  }

  const w = getWeekNumber(date);
  const goBtnHTML = `<button class="expand-go-btn" onclick="goToScheduleTab()">→ 일정·계약 탭 ${w}주차로 이동</button>`;

  return headerHTML + listHTML + goBtnHTML;
}

/* 미팅 카드 비고 토글 */
function toggleNote(isoDate, idx) {
  const noteEl = document.getElementById(`note-${isoDate}-${idx}`);
  if (noteEl) noteEl.classList.toggle('open');
}


/* 미팅 한 줄 미니 카드 — 클릭 시 예약비고 인라인 펼침 */
function renderMeetingMini(m, isoDate, idx) {
  const stateMap = {
    '예약':   { card: 'card-reserved',    icon: '🟡' },
    '계약':   { card: 'card-contract',    icon: '💵' },
    '완료':   { card: 'card-done',        icon: '🟠' },
    '변경':   { card: 'card-rescheduled', icon: '📅' },
    '취소':   { card: 'card-canceled',    icon: '🔴' },
  };
  const s = stateMap[m.상태] || stateMap['예약'];
  const titleCls = m.상태 === '취소' ? 'canceled-text' : 'text-gray-900';
  const timeCls  = m.상태 === '취소' ? 'canceled-text' : 'text-gray-700';
  const placeCls = m.상태 === '취소' ? 'canceled-text' : 'text-gray-500';
  const feeBadge = m.상태 === '계약' && m.수임비 > 0
    ? `<span class="text-xs font-bold text-green-700 shrink-0">${m.수임비}만원</span>`
    : '';

  const note = (m.예약비고 || '').trim();
  const noteHTML = note
    ? `<div class="mini-note-label">예약비고</div><div class="mini-note-text">${escHtml(note)}</div>`
    : `<div class="mini-note-empty">비고 없음</div>`;

  return `
    <div>
      <div class="mini-card ${s.card} rounded-lg px-3 py-2 flex items-center gap-2 fade-in"
           onclick="toggleNote('${isoDate}', ${idx})">
        <span class="shrink-0 text-base leading-none">${s.icon}</span>
        <span class="text-xs font-bold ${timeCls} shrink-0">${escHtml(m.미팅시간)}</span>
        <span class="badge ${BADGE_CLASS[m.channel]} shrink-0">${escHtml(m.channel)}</span>
        <span class="text-xs font-semibold ${titleCls} truncate flex-1">${escHtml(m.업체명)}</span>
        <span class="text-xs ${placeCls} truncate shrink-0 max-w-16">${escHtml(m.장소)}</span>
        ${feeBadge}
      </div>
      <div id="note-${isoDate}-${idx}" class="mini-note">${noteHTML}</div>
    </div>
  `;
}

/* ============================================================
   액션
   ============================================================ */
function moveMonth(delta) {
  let newYear = currentMonth.year;
  let newMonth = currentMonth.month + delta;
  if (newMonth < 0)  { newYear--; newMonth = 11; }
  if (newMonth > 11) { newYear++; newMonth = 0;  }

  currentMonth.year = newYear;
  currentMonth.month = newMonth;
  selectedDate = null; // 다른 달로 가면 선택 해제
  renderCalendar();
}

function selectDate(isoDate) {
  // 같은 날짜 다시 클릭 → 토글로 닫기
  if (selectedDate === isoDate) {
    selectedDate = null;
  } else {
    selectedDate = isoDate;
  }
  renderCalendar();
}

function goToScheduleTab() {
  if (!selectedDate) return;
  const date = fromISODate(selectedDate);
  const w = getWeekNumber(date);
  showToast(`📝 일정·계약 탭의 ${w}주차로 이동 (시뮬)`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   초기화
   ============================================================ */
function renderAll() {
  renderCalendar();
}

/* 요일 헤더 sticky 위치를 월 네비 실측 높이로 동적 정렬
   — 픽셀 추정값(152, 160 등)으로는 폰트/줌/디바이스에 따라 어긋나므로
     매번 실측해서 정확히 맞춤 */
function alignDayHeaderToMonthNav() {
  const monthNav = document.getElementById('month-nav');
  const dayBar   = document.getElementById('day-header-bar');
  if (!monthNav || !dayBar) return;

  // 페이지 배너(48px) + 슬림 브랜드 바(48px) = 96px (월 네비의 sticky top 값)
  // 요일 헤더 = 96 + 월 네비 실측 높이
  const STICKY_BASE = 96;
  const navHeight = monthNav.getBoundingClientRect().height;
  dayBar.style.top = `${STICKY_BASE + Math.round(navHeight)}px`;
}

renderAll();

// 첫 렌더 후 정렬 (DOM 안정화 후)
requestAnimationFrame(() => {
  requestAnimationFrame(alignDayHeaderToMonthNav);
});

// 화면 회전·리사이즈 시 재계산
window.addEventListener('resize', alignDayHeaderToMonthNav);
</script>
