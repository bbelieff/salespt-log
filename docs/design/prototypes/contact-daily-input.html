<!DOCTYPE html>
<html lang="ko">
<!-- Design: 컨택관리 탭 v1 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>컨택관리 · 세일즈PT 영업일지</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  * { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #f8fafc; margin: 0; padding: 0; }

  /* ── Stepper (components.md 정의 그대로) ─────────── */
  .stepper-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; cursor: pointer;
    user-select: none; transition: all 0.15s;
  }
  .stepper-btn:active { transform: scale(0.9); }

  .stepper-val {
    width: 44px; text-align: center; font-size: 18px; font-weight: 700;
    border: none; background: transparent; cursor: pointer;
    -moz-appearance: textfield;
  }
  .stepper-val::-webkit-outer-spin-button,
  .stepper-val::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .stepper-val:focus {
    outline: 2px solid #3b82f6; border-radius: 8px;
    background: white; cursor: text;
  }

  /* ── 채널 배지 (components.md 정의 그대로) ─────────── */
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .badge-purchase { background: #dbeafe; color: #1d4ed8; }
  .badge-direct   { background: #dcfce7; color: #16a34a; }
  .badge-banner   { background: #fef3c7; color: #d97706; }
  .badge-referral { background: #f3e8ff; color: #7c3aed; }

  /* ── 고정 영역 ─────────── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
  .save-bar   { position: fixed; bottom: 64px; left: 0; right: 0; z-index: 49; }
  .content-area { padding-bottom: 152px; }

  /* ── 토스트 ─────────── */
  .toast {
    position: fixed; bottom: 152px; left: 50%; transform: translateX(-50%);
    background: rgba(17, 24, 39, 0.95); color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    z-index: 100; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }

  /* ── 페이드 ─────────── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease; }

  /* ── 채널 탭 밑줄 ─────────── */
  .channel-tab { position: relative; transition: all 0.2s; }
  .channel-tab .underline {
    position: absolute; bottom: -1px; left: 12%; right: 12%; height: 3px;
    border-radius: 2px 2px 0 0; opacity: 0; transition: opacity 0.2s;
  }
  .channel-tab.active .underline { opacity: 1; }

  /* ── 스피너 (저장중) ─────────── */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 미팅 카드 상태별 스타일 (일정·계약 탭과 통일) ─────────── */
  .card-reserved  { background: white;   border-left: 4px solid #60a5fa; }
  .card-done      { background: #f0fdf4; border-left: 4px solid #4ade80; }
  .card-contract  { background: #dcfce7; border-left: 4px solid #16a34a;
                    box-shadow: 0 2px 8px rgba(22, 163, 74, 0.15); }
  .card-canceled  { background: #fef2f2; border-left: 4px solid #fca5a5; opacity: 0.72; }
  .canceled-text  { text-decoration: line-through; color: #9ca3af; }

  /* ── 확장 애니메이션 ─────────── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .expand-body { animation: slideDown 0.2s ease; }

  /* ── 수임비 입력 ─────────── */
  .fee-input {
    width: 100%; padding: 8px 10px; font-size: 16px; font-weight: 600;
    border: 1px solid #e5e7eb; border-radius: 8px;
    -moz-appearance: textfield; background: white;
  }
  .fee-input::-webkit-outer-spin-button,
  .fee-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .fee-input:focus { outline: 2px solid #3b82f6; border-color: transparent; }

  /* ── 계약 확정 버튼 ─────────── */
  .confirm-btn {
    background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    color: white; font-weight: 700;
    box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
  }
  .confirm-btn:hover { filter: brightness(1.05); }
  .confirm-btn:active { transform: scale(0.98); }

  /* ── 날짜 표시 박스 (input 안에 yyyy-mm-dd (요일) 표시) ───────────
     native input type=date는 표시 형식을 바꿀 수 없으므로,
     화면에는 우리가 만든 박스만 보여주고 native input은 0x0으로 숨김.
     박스 클릭 시 JS로 showPicker() 호출해 picker만 띄움. */
  .date-display-box {
    position: relative;
    display: flex; align-items: center; gap: 4px;
    padding: 8px 10px;
    border: 1px solid #e5e7eb; border-radius: 8px;
    background: white; cursor: pointer;
    font-size: 14px;
    user-select: none;
  }
  .date-display-box:hover { border-color: #93c5fd; }
  .date-display-box.is-focused,
  .date-display-box:focus-within {
    border-color: #3b82f6;
    outline: 2px solid #3b82f6; outline-offset: -2px;
  }
  .date-display-box .date-text { color: #1f2937; font-weight: 600; }
  .date-display-box .date-text.empty { color: #9ca3af; font-weight: 400; }
  .date-display-box .date-suffix { color: #4b5563; font-weight: 600; }
  /* native input을 진짜로 안 보이게: 0x0 + opacity 0 + pointer-events 차단 */
  .date-display-box .date-input-hidden {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0;
    opacity: 0; border: 0; padding: 0; margin: 0;
    pointer-events: none;
  }
  /* ── 시·분 select (15분 단위 강제) ─────────── */
  .time-select {
    flex: 1;
    padding: 8px 4px;
    font-size: 14px; font-weight: 600;
    border: 1px solid #e5e7eb; border-radius: 8px;
    background: white; cursor: pointer;
    appearance: none; -webkit-appearance: none; -moz-appearance: none;
    text-align: center; text-align-last: center;
    min-width: 0;
  }
  .time-select:focus { outline: 2px solid #3b82f6; border-color: transparent; }
  .time-select:invalid { color: #9ca3af; }   /* 미선택 placeholder 색 */
</style>
</head>
<body>

<!-- ==================== 페이지 배너 ==================== -->
<div class="bg-slate-100 border-b border-slate-200 px-4 h-12 flex items-center gap-3 sticky top-[48px] z-40">
  <div class="w-1 h-5 bg-slate-500 rounded-sm"></div>
  <h1 class="text-sm font-semibold text-slate-700">📋 컨택관리</h1>
</div>


<!-- ============================================================
     1. 헤더: 주차 네비 + 요일 바
     ============================================================ -->
<header class="bg-white shadow-sm sticky top-[96px] z-30">
  <!-- 1-1. 주차 타이틀 + 좌우 화살표 -->
  <div class="flex items-center justify-between px-2 py-3">
    <button onclick="moveWeek(-1)"
      class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-gray-600 active:scale-90 transition-all"
      aria-label="이전 주차">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <div class="text-center flex-1">
      <div class="text-base font-bold text-gray-900" id="week-title">1주차</div>
      <div class="text-xs text-gray-400 mt-0.5">(예시: PRM 5기 기준)</div>
    </div>

    <button onclick="moveWeek(1)"
      class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-gray-600 active:scale-90 transition-all"
      aria-label="다음 주차">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <!-- 1-2. 요일 바 (월~일) -->
  <div class="px-2 pb-2.5 grid grid-cols-7 gap-1" id="day-bar"></div>
</header>

<!-- ============================================================
     2. 본문 영역
     ============================================================ -->
<main class="content-area px-4 pt-4">

  <!-- 2-1. 선택된 날짜 표시 -->
  <div class="bg-blue-50 border-l-4 border-blue-500 rounded-r-xl px-3 py-2 mb-3">
    <span class="text-sm font-semibold text-blue-800" id="selected-date-label">4월 22일 (수) — 오늘</span>
  </div>

  <!-- 2-2. 채널 탭 (4개) -->
  <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-3">
    <div class="flex border-b border-gray-100" id="channel-tabs">
      <!-- JS로 동적 렌더 -->
    </div>

    <!-- 2-3. 채널별 4개 지표 입력 영역 -->
    <div id="channel-panel" class="fade-in">
      <!-- JS로 동적 렌더 -->
    </div>
  </div>

  <!-- 2-4. 미팅예약하기 (컨택성공 1건 = 미팅예약 1건) -->
  <div class="mb-3">
    <div class="flex items-center justify-between mb-2 px-1">
      <span class="text-sm font-semibold text-gray-700" id="meeting-slots-title">미팅예약하기</span>
      <span class="text-xs text-gray-400">컨택성공 1건 = 미팅예약 1건</span>
    </div>
    <div id="meeting-slots"></div>
  </div>

</main>

<!-- ============================================================
     3. 고정 저장 버튼
     ============================================================ -->

<script>
/* ============================================================
   설정값 (예시: PRM 5기 — 실제로는 시트 N1에서 읽어옴)
   ============================================================ */
const USER_INFO = {
  cohort: 'PRM 5기',
  name:   '이수강'
};
const COURSE_START = new Date(2026, 3, 17); // 4월 17일 금요일 (예시: PRM 5기 시작 = 금요일 기준)
const TODAY        = new Date(2026, 3, 23); // 4월 23일 목요일 (오늘)

/* 요일: 금(0) 토(1) 일(2) 월(3) 화(4) 수(5) 목(6) */
const DAY_NAMES = ['금', '토', '일', '월', '화', '수', '목'];
/* 주말(빨강 표시) 인덱스: 토=1, 일=2 */
const WEEKEND_IDX = [1, 2];

const CHANNELS = [
  {
    id: 'purchase', name: '매입DB', color: 'blue',
    desc: 'DB생산업체로부터 구매',
    helps: {
      prod:    '구매한 DB 수',
      inflow:  '오늘 전달받은 DB 수',
      contact: '부재 제외, 실제 통화 수',
      success: '미팅 예약 확정된 수'
    }
  },
  {
    id: 'direct', name: '직접생산', color: 'green',
    desc: '메타·구글·당근 등',
    helps: {
      prod:    '오늘 생산된 DB 수',
      inflow:  '오늘 유입된 DB 수 (보통=생산)',
      contact: '부재 제외, 실제 통화 수',
      success: '미팅 예약 확정된 수'
    }
  },
  {
    id: 'banner', name: '현수막', color: 'amber',
    desc: '오프라인 현수막 광고',
    helps: {
      prod:    '오늘 부착·노출된 현수막 수',
      inflow:  '오늘 유입된 문의 수',
      contact: '부재 제외, 실제 통화 수',
      success: '미팅 예약 확정된 수'
    }
  },
  {
    id: 'referral', name: '콜·지·기·소', color: 'purple',
    desc: '콜드콜·지인·기존고객·소개',
    helps: {
      prod:    '발굴한 컨택대상 수 (=유입)',
      inflow:  '컨택대상 수 (생산과 동일)',
      contact: '부재 제외, 실제 통화 수',
      success: '미팅 예약 확정된 수'
    }
  }
];

/* 채널별 색상 클래스 매핑 (Tailwind safelist 우회용) */
const COLOR_CLASS = {
  blue:   { bg50: 'bg-blue-50',   bg100: 'bg-blue-100',   bg500: 'bg-blue-500',   text600: 'text-blue-600',   text700: 'text-blue-700',   under: 'bg-blue-500',   hover: 'hover:bg-blue-600',   border: 'border-blue-200',   borderL500: 'border-blue-500'   },
  green:  { bg50: 'bg-green-50',  bg100: 'bg-green-100',  bg500: 'bg-green-500',  text600: 'text-green-600',  text700: 'text-green-700',  under: 'bg-green-500',  hover: 'hover:bg-green-600',  border: 'border-green-200',  borderL500: 'border-green-500'  },
  amber:  { bg50: 'bg-amber-50',  bg100: 'bg-amber-100',  bg500: 'bg-amber-500',  text600: 'text-amber-600',  text700: 'text-amber-700',  under: 'bg-amber-500',  hover: 'hover:bg-amber-600',  border: 'border-amber-200',  borderL500: 'border-amber-500'  },
  purple: { bg50: 'bg-purple-50', bg100: 'bg-purple-100', bg500: 'bg-purple-500', text600: 'text-purple-600', text700: 'text-purple-700', under: 'bg-purple-500', hover: 'hover:bg-purple-600', border: 'border-purple-200', borderL500: 'border-purple-500' },
};

const BADGE_CLASS = {
  blue: 'badge-purchase', green: 'badge-direct', amber: 'badge-banner', purple: 'badge-referral'
};

/* ============================================================
   상태
   ============================================================ */
let currentWeek    = getWeekNumber(TODAY);    // 현재 표시 중인 주차
let selectedDayIdx = jsDayToWeekIdx(TODAY);   // 금=0, 토=1, 일=2, 월=3, 화=4, 수=5, 목=6
let selectedChannel = 0; // 0~3

/* 데이터: { 'W주차_요일_채널id': { prod, inflow, contact, success } } */
const data = {};

/* 펼쳐진 미팅 카드 ID 집합 (UI 상태, 저장 안 됨) */
const expandedSlotIds = new Set();

/* ============================================================
   유틸: 날짜·주차 계산 (금요일 시작 기준)
   ============================================================ */
/* JS getDay(): 일=0, 월=1, ..., 금=5, 토=6
   금요일=0 기준으로 재매핑: (js - 5 + 7) % 7 */
function jsDayToWeekIdx(date) {
  return (date.getDay() - 5 + 7) % 7;
}

function getWeekNumber(date) {
  const diff = Math.floor((date - COURSE_START) / 86400000);
  return Math.floor(diff / 7) + 1;
}

function getWeekStartDate(weekNum) {
  const d = new Date(COURSE_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}

function getDateOfWeek(weekNum, dayIdx) {
  const d = getWeekStartDate(weekNum);
  d.setDate(d.getDate() + dayIdx);
  return d;
}

function fmtMD(date) {
  return `${date.getMonth() + 1}월 ${date.getDate()}일`;
}

function isToday(date) {
  return date.toDateString() === TODAY.toDateString();
}

function getKey(weekNum, dayIdx, channelIdx) {
  return `${weekNum}_${dayIdx}_${CHANNELS[channelIdx].id}`;
}

function getCellData(weekNum, dayIdx, channelIdx) {
  const key = getKey(weekNum, dayIdx, channelIdx);
  if (!data[key]) data[key] = { prod: 0, inflow: 0, contact: 0, success: 0 };
  return data[key];
}

/* 4채널 합계 (그 날짜의 특정 지표를 4채널 모두 더함) */
function getChannelSum(weekNum, dayIdx, metric) {
  let sum = 0;
  for (let ch = 0; ch < 4; ch++) {
    sum += getCellData(weekNum, dayIdx, ch)[metric];
  }
  return sum;
}

/* 검증 규칙: 컨택진행 ≥ 컨택성공 (위반 시 컨택성공 자동 보정)
   ※ 유입 ≥ 컨택진행 규칙은 없음 — 전날 유입분을 오늘 컨택할 수 있기 때문 */
function validateAndCap(cell) {
  if (cell.success > cell.contact) cell.success = cell.contact;
  syncSlots(cell);   // 컨택성공 수와 미팅 슬롯 수 동기화
}

/* 미팅 카드 배열과 컨택성공 수 동기화 */
function syncSlots(cell) {
  if (!cell.slots) cell.slots = [];
  while (cell.slots.length < cell.success) {
    cell.slots.push({
      id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      saved: false,    // [등록] 클릭 여부 (false=신규, true=등록 완료)
      // 기본 예약 정보 (신규 카드는 빈 값)
      meetingDate: '', meetingTime: '', company: '', location: '',
      reservationNote: '',
      // ↓ 일정·계약 탭에서 관리하는 필드 (컨택관리 탭에서는 노출 안 함)
      // 업체관리!J = 상태, K = 계약여부, L = 수임비, M = 미팅결과
      status: '예약', contracted: false, fee: 0, meetingResult: ''
    });
  }
  while (cell.slots.length > cell.success) {
    const removed = cell.slots.pop();
    if (removed && removed.id) expandedSlotIds.delete(removed.id);
  }
}

/* ============================================================
   렌더: 헤더 (주차 + 요일 바)
   ============================================================ */
function renderHeader() {
  // 주차 타이틀: "PRM 5기 · 이수강 · N주차"
  document.getElementById('week-title').textContent =
    `${currentWeek}주차`;

  // 요일 바 (금→목)
  const bar = document.getElementById('day-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const date = getDateOfWeek(currentWeek, i);
    const isWeekend = WEEKEND_IDX.includes(i);  // 토(1)·일(2)만 빨강
    const today = isToday(date);
    const selected = i === selectedDayIdx;

    const btn = document.createElement('button');
    btn.onclick = () => selectDay(i);
    btn.className = `relative flex flex-col items-center justify-center py-1.5 rounded-xl transition-all active:scale-95 ${
      selected ? 'bg-blue-500 text-white shadow-md shadow-blue-500/30'
               : 'bg-gray-50 hover:bg-gray-100'
    }`;

    const dayNameColor = selected
      ? 'text-white'
      : (isWeekend ? 'text-red-500' : 'text-gray-500');
    const dateColor = selected ? 'text-white' : 'text-gray-800';

    btn.innerHTML = `
      <span class="text-xs font-medium ${dayNameColor}">${DAY_NAMES[i]}</span>
      <span class="text-base font-bold ${dateColor} leading-tight">${date.getDate()}</span>
      ${today ? `<span class="absolute -top-1.5 ${selected ? 'bg-white text-blue-600' : 'bg-blue-500 text-white'} text-xs font-bold px-1.5 py-px rounded-full leading-none">오늘</span>` : ''}
    `;
    bar.appendChild(btn);
  }

  // 선택된 날짜 라벨
  const sel = getDateOfWeek(currentWeek, selectedDayIdx);
  const todayMark = isToday(sel) ? ' — 오늘' : '';
  document.getElementById('selected-date-label').textContent =
    `${fmtMD(sel)} (${DAY_NAMES[selectedDayIdx]})${todayMark}`;
}

/* ============================================================
   렌더: 채널 탭 (4개, 합계 뱃지 포함)
   ============================================================ */
function renderChannelTabs() {
  const tabs = document.getElementById('channel-tabs');
  tabs.innerHTML = '';

  CHANNELS.forEach((ch, idx) => {
    const cls = COLOR_CLASS[ch.color];
    const active = idx === selectedChannel;
    const cell = getCellData(currentWeek, selectedDayIdx, idx);
    const total = cell.prod + cell.inflow + cell.contact + cell.success;

    const btn = document.createElement('button');
    btn.onclick = () => selectChannel(idx);
    btn.className = `channel-tab flex-1 py-2.5 px-1 transition-all ${
      active ? cls.bg50 : 'bg-white hover:bg-gray-50'
    }`;

    const nameColor = active ? cls.text700 : 'text-gray-500';
    const badgeBg   = active ? cls.bg100 : 'bg-gray-100';
    const badgeText = active ? cls.text700 : 'text-gray-500';

    btn.innerHTML = `
      <div class="flex flex-col items-center gap-1">
        <span class="text-xs font-bold ${nameColor}">${ch.name}</span>
        ${total > 0
          ? `<span class="text-[10px] font-semibold px-1.5 py-px rounded-full ${badgeBg} ${badgeText} leading-none">${total}</span>`
          : `<span class="text-[10px] text-gray-300 leading-none">·</span>`
        }
      </div>
      <span class="underline ${cls.under}"></span>
    `;
    if (active) btn.classList.add('active');
    tabs.appendChild(btn);
  });
}

/* ============================================================
   렌더: 채널별 4개 지표 입력 패널 (왼쪽 6 : 오른쪽 4)
   ============================================================ */
function renderChannelPanel() {
  const panel = document.getElementById('channel-panel');
  const ch = CHANNELS[selectedChannel];
  const cls = COLOR_CLASS[ch.color];
  const cell = getCellData(currentWeek, selectedDayIdx, selectedChannel);

  /* upstream: 컨택성공만 컨택진행에 묶임. 유입·컨택진행은 독립 */
  const metrics = [
    { key: 'prod',    label: '생산',     help: ch.helps.prod,    upstream: null },
    { key: 'inflow',  label: '유입',     help: ch.helps.inflow,  upstream: null },
    { key: 'contact', label: '컨택진행', help: ch.helps.contact, upstream: null },
    { key: 'success', label: '컨택성공', help: ch.helps.success, upstream: 'contact' },
  ];

  panel.innerHTML = `
    <div class="${cls.bg50} px-3 py-2 flex items-center gap-2 border-b ${cls.border}">
      <span class="badge ${BADGE_CLASS[ch.color]}">${ch.name}</span>
      <span class="text-xs text-gray-500 truncate">${ch.desc}</span>
    </div>
    <div class="flex items-stretch border-b border-gray-100 bg-gray-50">
      <div class="w-3/5 px-3 py-1.5 text-xs font-semibold text-gray-500">채널 입력</div>
      <div class="w-2/5 px-2 py-1.5 text-xs font-bold text-center border-l-2 bg-indigo-100 text-indigo-700">
        ⭐ 오늘 채널 합계
      </div>
    </div>
    ${metrics.map((m, mi) => {
      const total     = getChannelSum(currentWeek, selectedDayIdx, m.key);
      const atLimit   = m.upstream && cell[m.key] >= cell[m.upstream];
      const plusClass = atLimit
        ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
        : `${cls.bg500} text-white ${cls.hover}`;
      return `
      <div class="flex items-stretch ${mi < metrics.length - 1 ? 'border-b border-gray-50' : ''}">
        <div class="w-3/5 px-3 py-3 flex items-center justify-between min-w-0">
          <div class="min-w-0 pr-1">
            <div class="text-sm font-medium text-gray-800">${m.label}</div>
            <div class="text-xs text-gray-400 truncate">${m.help}</div>
          </div>
          <div class="flex items-center gap-1 shrink-0">
            <button class="stepper-btn bg-gray-100 text-gray-600 hover:bg-gray-200"
              onclick="step('${m.key}', -1)" aria-label="${m.label} 감소">−</button>
            <input type="number" inputmode="numeric" min="0"
              class="stepper-val" id="val-${m.key}" value="${cell[m.key]}"
              onchange="setVal('${m.key}', this.value)"
              aria-label="${m.label} 수치">
            <button class="stepper-btn ${plusClass}"
              onclick="step('${m.key}', 1)"
              ${atLimit ? 'aria-disabled="true"' : ''}
              aria-label="${m.label} 증가">＋</button>
          </div>
        </div>
        <div class="w-2/5 py-3 text-center border-l-2 bg-indigo-50 flex flex-col items-center justify-center">
          <div class="text-3xl font-extrabold ${total > 0 ? 'text-indigo-700' : 'text-gray-300'} leading-none">${total}</div>
          <div class="text-xs ${total > 0 ? 'text-indigo-600' : 'text-gray-400'} mt-1 font-semibold">${m.label}</div>
        </div>
      </div>
      `;
    }).join('')}
  `;
}

/* ============================================================
   렌더: 미팅 카드 (4채널 통합, 컨택성공 순서대로)
   - 한 줄 축소 ↔ 확장 토글
   - 상태별 배경색 (예약/완료/계약완료/취소)
   ============================================================ */
function renderMeetingSlots() {
  const container = document.getElementById('meeting-slots');
  const titleEl   = document.getElementById('meeting-slots-title');
  const reservedDate = getDateOfWeek(currentWeek, selectedDayIdx);
  const reservedMd   = fmtMD(reservedDate);

  // 모든 채널의 슬롯 배열 sync (컨택성공 수와 슬롯 수 일치시킴)
  CHANNELS.forEach((_, idx) => {
    const cell = getCellData(currentWeek, selectedDayIdx, idx);
    syncSlots(cell);
  });

  // 4채널 슬롯을 채널 순서대로 펼침
  const allSlots = [];
  CHANNELS.forEach((ch, channelIdx) => {
    const cell = getCellData(currentWeek, selectedDayIdx, channelIdx);
    cell.slots.forEach((slot, slotIdx) => {
      allSlots.push({ channel: ch, channelIdx, slotIdx, slot });
    });
  });

  titleEl.textContent = allSlots.length > 0
    ? `미팅예약하기 · ${allSlots.length}건`
    : '미팅예약하기';

  if (allSlots.length === 0) {
    container.innerHTML = `
      <div class="bg-white rounded-xl border-2 border-dashed border-gray-200 px-4 py-6 text-center">
        <div class="text-sm text-gray-400">컨택성공을 입력하면<br/>미팅예약 카드가 자동 생성됩니다</div>
      </div>
    `;
    return;
  }

  container.innerHTML = allSlots.map((s, i) =>
    renderMeetingCard(s.channel, s.channelIdx, s.slotIdx, s.slot, i, reservedMd)
  ).join('');
}

/* ============================================================
   요일 표시 헬퍼 (날짜 옆에 한글 요일 표시용)
   ============================================================ */
const DAY_KO = ['일', '월', '화', '수', '목', '금', '토'];
function getDaySuffix(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate);
  if (isNaN(d.getTime())) return '';
  return DAY_KO[d.getDay()];
}

/* ============================================================
   한 카드 렌더링 (컨택관리 탭 — 신규/등록완료 두 상태만)
   - saved=false: 신규 카드 (펼침 상태) / [등록][삭제] 버튼
   - saved=true:  등록 완료 (접힘 상태) / 탭하여 펼치면 [수정][삭제]
   ============================================================ */
function renderMeetingCard(channel, channelIdx, slotIdx, slot, index, reservedMd) {
  const esc = v => (v || '').toString().replace(/"/g, '&quot;').replace(/</g, '&lt;');

  // 신규는 강제 펼침. 등록 완료는 expandedSlotIds로 토글
  const isOpen = !slot.saved || expandedSlotIds.has(slot.id);

  // 카드 색: 신규=흰색 + 회색 좌측바 / 등록 완료=흰색 + 파란 좌측바
  const cardClass = slot.saved
    ? 'bg-white border-l-4 border-blue-400'
    : 'bg-white border-l-4 border-gray-300';

  // 한 줄 접힘에 표시할 정보
  const collapsedTime    = slot.meetingTime || '—:—';
  const collapsedCompany = slot.company || '(업체 미입력)';
  const collapsedPlace   = slot.location || '';
  const stateIcon = slot.saved ? '🔵' : '⚪';   // 등록=파랑 / 신규=빈 동그라미

  const header = `
    <button class="w-full px-3 py-3 flex items-center gap-2 text-left active:bg-black active:bg-opacity-5 transition-colors ${!slot.saved ? 'pointer-events-none' : ''}"
      onclick="toggleSlotExpand('${slot.id}')" aria-expanded="${isOpen}">
      <span class="shrink-0 text-xs font-bold text-gray-400">#${index + 1}</span>
      <span class="badge ${BADGE_CLASS[channel.color]} shrink-0">${channel.name}</span>
      <span class="shrink-0 text-base leading-none">${stateIcon}</span>
      <span class="text-sm font-bold text-gray-700 shrink-0">${collapsedTime}</span>
      <span class="text-sm font-semibold text-gray-900 truncate flex-1">${esc(collapsedCompany)}</span>
      <span class="text-xs text-gray-500 truncate shrink-0 max-w-20">${esc(collapsedPlace)}</span>
      ${slot.saved ? `
        <svg class="w-4 h-4 text-gray-400 shrink-0 transition-transform ${isOpen ? 'rotate-180' : ''}"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>` : ''}
    </button>
  `;

  let body = '';
  if (isOpen) {
    body = `<div class="expand-body border-t border-gray-200 px-3 py-3 space-y-3">${
      renderCardExpandBody(channel, channelIdx, slotIdx, slot, reservedMd)
    }</div>`;
  }

  return `
    <div class="rounded-xl shadow-sm mb-2 overflow-hidden ${cardClass}">
      ${header}${body}
    </div>
  `;
}

/* 카드 확장 내용 (컨택관리 탭 — 예약 입력 + [등록][삭제] 액션) */
function renderCardExpandBody(channel, channelIdx, slotIdx, slot, reservedMd) {
  const esc = v => (v || '').toString().replace(/"/g, '&quot;').replace(/</g, '&lt;');

  // 헤더: 채널 배지 + 예약생성일 (이미 카드 헤더 한 줄에 채널 표시했지만, 펼침에서 한 번 더 컨텍스트 제공)
  const header = `
    <div class="flex items-center justify-between text-xs text-gray-400">
      <span>예약생성 ${reservedMd}</span>
      ${slot.saved ? '<span class="text-blue-600 font-semibold">✓ 등록됨</span>' : '<span class="text-amber-600 font-semibold">신규 입력</span>'}
    </div>
  `;

  // 미팅 일정(날짜) — 표시 박스만 보이고, native input은 0x0으로 숨김
  // 박스 클릭 → openDatePicker()가 input의 showPicker() 호출
  const daySuffix = getDaySuffix(slot.meetingDate);
  const hasDate   = !!slot.meetingDate;
  const dateInputId = `${slot.id}-date-input`;
  const dateBlock = `
    <div class="flex-1 min-w-0">
      <label class="text-xs text-gray-500 block mb-1">미팅 일정</label>
      <div class="date-display-box" onclick="openDatePicker('${dateInputId}')">
        <span class="date-text ${hasDate ? '' : 'empty'}" id="${slot.id}-date-text">${hasDate ? esc(slot.meetingDate) : '날짜 선택'}</span>
        <span class="date-suffix" id="${slot.id}-date-suffix">${daySuffix ? `(${daySuffix})` : ''}</span>
        <span class="ml-auto text-gray-400">📅</span>
        <input type="date" class="date-input-hidden" id="${dateInputId}"
          value="${esc(slot.meetingDate)}"
          onchange="updateSlot(${channelIdx}, ${slotIdx}, 'meetingDate', this.value); refreshDateBox(this, '${slot.id}-date-text', '${slot.id}-date-suffix')">
      </div>
    </div>
  `;

  // 시간 — 시 select(0~23) + 분 select(00·15·30·45)
  // (입력 type=time의 step="900"은 모바일 picker가 무시하므로 select로 강제)
  const [curHH = '', curMM = ''] = (slot.meetingTime || '').split(':');
  const hourOpts = Array.from({length: 24}, (_, i) => {
    const v = String(i).padStart(2, '0');
    return `<option value="${v}" ${v === curHH ? 'selected' : ''}>${v}</option>`;
  }).join('');
  const minOpts = ['00', '15', '30', '45'].map(v =>
    `<option value="${v}" ${v === curMM ? 'selected' : ''}>${v}</option>`
  ).join('');

  const timeBlock = `
    <div class="shrink-0" style="width:140px">
      <label class="text-xs text-gray-500 block mb-1">시간</label>
      <div class="flex items-center gap-1">
        <select class="time-select" required
          onchange="updateSlotTime(${channelIdx}, ${slotIdx}, 'h', this.value)"
          aria-label="시">
          <option value="" ${curHH ? '' : 'selected'} disabled hidden>시</option>
          ${hourOpts}
        </select>
        <span class="text-gray-500 font-bold">:</span>
        <select class="time-select" required
          onchange="updateSlotTime(${channelIdx}, ${slotIdx}, 'm', this.value)"
          aria-label="분">
          <option value="" ${curMM ? '' : 'selected'} disabled hidden>분</option>
          ${minOpts}
        </select>
      </div>
    </div>
  `;

  const companyBlock = `
    <div>
      <label class="text-xs text-gray-500 block mb-1">업체명</label>
      <input type="text" class="w-full px-2 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white"
        placeholder="예: ○○부동산"
        value="${esc(slot.company)}"
        oninput="updateSlot(${channelIdx}, ${slotIdx}, 'company', this.value)">
    </div>
  `;

  const locationBlock = `
    <div>
      <label class="text-xs text-gray-500 block mb-1">장소</label>
      <input type="text" class="w-full px-2 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white"
        placeholder="예: 잠실"
        value="${esc(slot.location)}"
        oninput="updateSlot(${channelIdx}, ${slotIdx}, 'location', this.value)">
    </div>
  `;

  const reservationNote = `
    <div>
      <label class="flex items-center gap-1 text-xs font-semibold text-gray-600 mb-1">
        <span>📝 예약비고</span>
        <span class="text-gray-400 font-normal">· 미팅 전 준비정보</span>
      </label>
      <textarea rows="2"
        class="w-full px-2 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 resize-none bg-white"
        placeholder="예: 사장님 부재 시간, 지참서류"
        oninput="updateSlot(${channelIdx}, ${slotIdx}, 'reservationNote', this.value)">${esc(slot.reservationNote)}</textarea>
    </div>
  `;

  // [등록] 버튼: 신규는 "등록", 이미 등록된 카드는 "수정 완료"
  const registerLabel = slot.saved ? '💾 수정 완료' : '✓ 등록';
  const actions = `
    <div class="flex gap-2 pt-1">
      <button onclick="registerSlot(${channelIdx}, ${slotIdx})"
        class="flex-1 py-2.5 text-sm font-bold text-white bg-blue-500 hover:bg-blue-600 rounded-lg transition-colors">
        ${registerLabel}
      </button>
      <button onclick="deleteSlot(${channelIdx}, ${slotIdx})"
        class="flex-1 py-2.5 text-sm font-bold text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 rounded-lg transition-colors">
        ✕ 삭제
      </button>
    </div>
    <div class="text-xs text-gray-400 text-center">
      ${slot.saved
        ? '미팅 완료/계약/취소는 일정·계약 탭에서 처리합니다'
        : '삭제 시 채널의 컨택성공 수치도 함께 1 감소합니다'}
    </div>
  `;

  return header + `
    <div class="flex gap-2">
      ${dateBlock}
      ${timeBlock}
    </div>
    ${companyBlock}
    ${locationBlock}
    ${reservationNote}
    ${actions}
  `;
}

/* 확장 토글 (등록된 카드만) */
function toggleSlotExpand(slotId) {
  if (expandedSlotIds.has(slotId)) expandedSlotIds.delete(slotId);
  else expandedSlotIds.add(slotId);
  renderMeetingSlots();
}

/* [등록] 버튼: 카드를 "등록 완료" 상태로 + 접기 + 시트 PATCH */
function registerSlot(channelIdx, slotIdx) {
  const cell = getCellData(currentWeek, selectedDayIdx, channelIdx);
  if (!cell.slots || !cell.slots[slotIdx]) return;
  const slot = cell.slots[slotIdx];

  // 기본 정보 검증
  if (!slot.meetingDate || !slot.meetingTime || !slot.company) {
    showToast('⚠ 미팅 일정·시간·업체명은 필수입니다');
    return;
  }

  const wasNew = !slot.saved;
  slot.saved = true;
  expandedSlotIds.delete(slot.id);   // 등록 완료 후 자동 접힘

  // 시트 동기화 (실제 환경에서는 API 호출)
  console.log(wasNew ? '[POST /api/meeting]' : '[PATCH /api/meeting]', {
    id: slot.id, channel: channelIdx, slotIdx,
    meetingDate: slot.meetingDate, meetingTime: slot.meetingTime,
    company: slot.company, location: slot.location,
    reservationNote: slot.reservationNote
  });

  showToast(wasNew ? '✓ 등록 완료' : '💾 수정 완료');
  renderMeetingSlots();
}

/* [삭제] 버튼: 슬롯 제거 + 컨택성공 -1 */
function deleteSlot(channelIdx, slotIdx) {
  const cell = getCellData(currentWeek, selectedDayIdx, channelIdx);
  if (!cell.slots || !cell.slots[slotIdx]) return;

  const removed = cell.slots.splice(slotIdx, 1)[0];
  if (removed && removed.id) expandedSlotIds.delete(removed.id);
  cell.success = Math.max(0, cell.success - 1);   // 컨택성공도 동시에 -1

  console.log('[DELETE /api/meeting]', { id: removed?.id, channel: channelIdx });
  showToast('✕ 삭제 · 컨택성공 -1');

  // 컨택성공 숫자가 바뀌었으니 채널 패널과 미팅 카드 모두 다시 렌더
  renderChannelPanel();
  renderMeetingSlots();
}

/* 슬롯 필드 업데이트 (값만 저장, 리렌더 없음 — 포커스 유지) */
function updateSlot(channelIdx, slotIdx, field, value) {
  const cell = getCellData(currentWeek, selectedDayIdx, channelIdx);
  if (!cell.slots) cell.slots = [];
  if (cell.slots[slotIdx]) {
    cell.slots[slotIdx][field] = value;
  }
}

/* 시간 select(시/분) 결합해서 meetingTime 저장 */
function updateSlotTime(channelIdx, slotIdx, part, value) {
  const cell = getCellData(currentWeek, selectedDayIdx, channelIdx);
  if (!cell.slots || !cell.slots[slotIdx]) return;
  const slot = cell.slots[slotIdx];
  const [hh = '', mm = ''] = (slot.meetingTime || '').split(':');
  const newHH = part === 'h' ? value : hh;
  const newMM = part === 'm' ? value : mm;
  // 둘 다 입력되어야 유효 시간으로 저장
  slot.meetingTime = (newHH && newMM) ? `${newHH}:${newMM}` : '';
}

/* 날짜 박스 갱신 — input 변경 시 표시 박스의 텍스트와 (요일)을 즉시 반영 */
function refreshDateBox(inputEl, textId, suffixId) {
  const text = document.getElementById(textId);
  const suffix = document.getElementById(suffixId);
  if (!text || !suffix) return;
  const v = inputEl.value;
  if (v) {
    text.textContent = v;
    text.classList.remove('empty');
    const day = getDaySuffix(v);
    suffix.textContent = day ? `(${day})` : '';
  } else {
    text.textContent = '날짜 선택';
    text.classList.add('empty');
    suffix.textContent = '';
  }
}

/* 박스 클릭 → 숨겨진 date input의 picker 띄우기
   showPicker()는 Chrome 99+, Safari 16.4+, Firefox 101+ 지원
   미지원 브라우저는 input.click() 폴백 */
function openDatePicker(inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  // pointer-events: none이라 click 받으려면 잠시 활성화
  input.style.pointerEvents = 'auto';
  try {
    if (typeof input.showPicker === 'function') {
      input.showPicker();
    } else {
      input.focus();
      input.click();
    }
  } catch (e) {
    // 일부 환경에서 showPicker가 throw — 폴백
    input.focus();
    input.click();
  }
  // 다음 tick에 다시 비활성화 (박스 클릭 영역이 input을 침해하지 않게)
  setTimeout(() => { input.style.pointerEvents = 'none'; }, 0);
}

/* ============================================================
   액션
   ============================================================ */
function moveWeek(delta) {
  const next = currentWeek + delta;
  if (next < 1) { showToast('1주차가 첫 주입니다'); return; }
  if (next > 10) { showToast('10주차 이후는 편집할 수 없습니다'); return; }
  currentWeek = next;
  renderAll();
}

function selectDay(idx) {
  selectedDayIdx = idx;
  renderAll();
}

function selectChannel(idx) {
  selectedChannel = idx;
  renderChannelTabs();
  renderChannelPanel();
}

function step(metric, delta) {
  const cell = getCellData(currentWeek, selectedDayIdx, selectedChannel);
  const next = Math.max(0, cell[metric] + delta);

  // + 방향 검증: 컨택성공은 컨택진행을 넘을 수 없음
  if (delta > 0 && metric === 'success' && next > cell.contact) {
    showToast('⚠ 컨택성공은 컨택진행보다 클 수 없어요');
    return;
  }

  cell[metric] = next;

  // 컨택진행이 줄면 컨택성공도 연쇄 보정. 슬롯도 sync
  if (delta < 0 || metric === 'success') validateAndCap(cell);

  renderChannelTabs();
  renderChannelPanel();
  renderMeetingSlots();
}

function setVal(metric, value) {
  const cell = getCellData(currentWeek, selectedDayIdx, selectedChannel);
  let next = Math.max(0, parseInt(value) || 0);

  // 컨택성공 직접 입력 시 컨택진행 값으로 클램프
  if (metric === 'success' && next > cell.contact) {
    next = cell.contact;
    showToast(`⚠ 컨택진행(${cell.contact})까지만 입력 가능`);
  }

  cell[metric] = next;

  // 컨택진행을 낮춰 컨택성공이 더 커진 경우 연쇄 보정
  validateAndCap(cell);

  renderChannelTabs();
  renderChannelPanel();
  renderMeetingSlots();
}

function saveDaily() {
  const btn = document.getElementById('save-btn');
  const txt = document.getElementById('save-btn-text');
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span> 시트 저장중...';

  setTimeout(() => {
    btn.disabled = false;
    txt.textContent = '💾 저장하기';
    showToast('✅ 저장 완료');
  }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ============================================================
   초기화
   ============================================================ */
function renderAll() {
  renderHeader();
  renderChannelTabs();
  renderChannelPanel();
  renderMeetingSlots();
}
