<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DB관리 · 세일즈PT 영업일지</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
  * { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #f8fafc; margin: 0; padding: 0; }

  /* 하단 네비 고정 */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
  .content-area { padding-bottom: 80px; }

  /* 채널 배지 */
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; display: inline-block; }
  .badge-purchase { background: #dbeafe; color: #1d4ed8; }
  .badge-direct   { background: #dcfce7; color: #16a34a; }
  .badge-banner   { background: #fef3c7; color: #d97706; }
  .badge-referral { background: #f3e8ff; color: #7c3aed; }

  /* 채널 토글 (4-segment) */
  .ch-tab {
    flex: 1; padding: 10px 4px;
    text-align: center; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; user-select: none;
    transition: all 0.18s;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .ch-tab:active { transform: scale(0.96); }
  /* 콜·지·기·소만 — 글자 수 많아 폰트 축소 */
  .ch-tab[data-ch="referral"] {
    font-size: 11px;
    letter-spacing: -0.5px;
  }
  /* 비활성 — 연한 배경 + 채널색 글자 */
  .ch-tab.ch-purchase { background: #eff6ff; color: #1d4ed8; }
  .ch-tab.ch-direct   { background: #f0fdf4; color: #16a34a; }
  .ch-tab.ch-banner   { background: #fffbeb; color: #b45309; }
  .ch-tab.ch-referral { background: #faf5ff; color: #7c3aed; }
  /* 활성 — 진한 채널색 + 흰 글자 + 그림자 */
  .ch-tab.active.ch-purchase { background: #1d4ed8; color: white; box-shadow: 0 4px 10px rgba(29,78,216,0.30); }
  .ch-tab.active.ch-direct   { background: #16a34a; color: white; box-shadow: 0 4px 10px rgba(22,163,74,0.30); }
  .ch-tab.active.ch-banner   { background: #d97706; color: white; box-shadow: 0 4px 10px rgba(217,119,6,0.30); }
  .ch-tab.active.ch-referral { background: #7c3aed; color: white; box-shadow: 0 4px 10px rgba(124,58,237,0.30); }

  /* 데이터 행 카드 */
  .row-card {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 12px; transition: all 0.15s;
    cursor: pointer;
  }
  .row-card:hover { border-color: #cbd5e1; }
  .row-card.expanded {
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    border-color: #93c5fd;
    cursor: default;
  }
  .row-num {
    font-size: 10px; font-weight: 700;
    background: #f1f5f9; color: #475569;
    padding: 2px 6px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }

  /* 자동계산 (수식) 컬럼 */
  .auto-field {
    background: #fef3c7 !important;
    color: #92400e !important;
    border: 1px dashed #d97706 !important;
    cursor: not-allowed !important;
    font-weight: 600;
  }
  .auto-label {
    font-size: 9px; font-weight: 700;
    background: #fef3c7; color: #92400e;
    padding: 1px 4px; border-radius: 3px;
    letter-spacing: -0.2px;
  }

  /* 토스트 */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: #1e293b; color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; z-index: 200;
    transition: transform 0.3s ease;
    max-width: 90%; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 폼 필드 */
  .field-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 14px; background: white;
    min-height: 40px;
  }
  .field-input:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
  .field-label {
    font-size: 11px; font-weight: 500; color: #4b5563;
    margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
    line-height: 1.3;
  }

  /* 합계 카드 — 채널색 좌측 보더 */
  .summary-card { border-left-width: 4px; border-left-style: solid; }

  /* 종합 카드 채널 점 */
  .ch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .num-mono { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<!-- ==================== 페이지 배너 ==================== -->

  <div class="w-1 h-5 bg-slate-500 rounded-sm"></div>
  <h1 class="text-sm font-semibold text-slate-700">📊 DB관리</h1>
</div>

<!-- ==================== 메인 ==================== -->
<main class="content-area px-4 pt-3">

  <!-- 종합 카드 — 4채널 한눈에 -->
  <div id="overall-card" class="bg-white rounded-xl shadow-sm p-4 mb-3"></div>

  <!-- 채널 4-segment 토글 -->
  <div class="flex gap-1.5 mb-3">
    <button class="ch-tab ch-purchase active" data-ch="purchase" onclick="switchChannel('purchase')">매입DB</button>
    <button class="ch-tab ch-direct"   data-ch="direct"   onclick="switchChannel('direct')">직접생산</button>
    <button class="ch-tab ch-banner"   data-ch="banner"   onclick="switchChannel('banner')">현수막</button>
    <button class="ch-tab ch-referral" data-ch="referral" onclick="switchChannel('referral')">콜·지·기·소</button>
  </div>

  <!-- 힌트 카드 -->
  <div id="hint-card" class="rounded-xl px-3 py-2.5 mb-3 flex items-start gap-2 border">
    <span class="text-base shrink-0">💡</span>
    <p id="hint-text" class="text-xs leading-relaxed flex-1"></p>
  </div>

  <!-- 합계 카드 (선택 채널) -->
  <div id="summary-card" class="summary-card bg-white rounded-xl shadow-sm p-4 mb-4"></div>

  <!-- 행 리스트 헤더 -->
  <div class="flex items-center justify-between mb-2 px-1">
    <h3 class="text-sm font-semibold text-gray-700" id="row-count-label">목록</h3>
  </div>

  <!-- 행 리스트 -->
  <div id="row-list" class="space-y-2"></div>

  <!-- 추가 버튼 -->
  <button id="add-row-btn" onclick="openAddForm()" class="w-full mt-3 py-3 bg-white border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-blue-400 hover:text-blue-600 font-medium text-sm transition-colors">
    + 추가
  </button>

  <!-- 추가 폼 (초기 hidden) -->
  <div id="add-form-container" class="hidden mt-3 bg-white rounded-xl shadow-md p-4 border-2 border-blue-200"></div>

</main>

  <button class="flex-1 py-2 flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600 transition-colors">

      { key: '주문개수', label: '주문개수', type: 'number', unit: '장' },
      { key: '주문금액', label: '부가세 제외 주문금액', type: 'number', unit: '원',

        calc: (r) => (Number(r.개당단가)||0) * (Number(r.주문개수)||0) },

// =============================================================
// [STEP 2/4] In-memory store — 채널별 더미 데이터
// rowNum = 시트 실제 행번호 (백엔드 동기화용, UI에는 노출 X)
// =============================================================
const dbStore = {
  purchase: [
    { rowNum: 2, 구매일: '2026-04-10', 업체명: '디비딩프로', 개당단가: 18000, 주문개수: 10, 기타: '잠실 4월권' },
    { rowNum: 3, 구매일: '2026-04-22', 업체명: 'DB나라',     개당단가: 22000, 주문개수: 6,  기타: '강남권' },
  ],
  direct: [
    { rowNum: 2, 날짜: '2026-04-15', 소재: '메타',  기간예산: 500000, 생산개수: 100, 기타: '리타겟' },
    { rowNum: 3, 날짜: '2026-04-25', 소재: '구글',  기간예산: 300000, 생산개수: 60,  기타: '키워드 신규' },
  ],
  banner: [
    { rowNum: 2, 날짜: '2026-04-08', 업체명: '(주)코리아광고', 도착일: '2026-04-12', 개당단가: 10000, 주문개수: 30, 기타: '잠실 지구대' },
  ],
  referral: [
    { rowNum: 2, 구분: '지인', 접수일: '2026-04-12', 대표자명: '김믿음', 업체명: '㈜에이스',  소개처: '잠실',  연락처: '010-1234-5678', 조건: '월 500 견적' },
    { rowNum: 3, 구분: '소개', 접수일: '2026-04-18', 대표자명: '이부자', 업체명: '믿음치킨',  소개처: '5기 박○○', 연락처: '010-9876-5432', 조건: '점주 직접 상담 원함' },
  ],
};

let currentCh   = 'purchase';
let expandedIdx = -1;
let addFormOpen = false;

// =============================================================
// [STEP 3/4] 렌더 함수
// =============================================================

/** 채널 전환 */
function switchChannel(ch) {
  currentCh   = ch;
  expandedIdx = -1;
  addFormOpen = false;
  document.querySelectorAll('.ch-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.ch === ch);
  });
  renderAll();
}

/** 종합·힌트·합계·리스트·버튼 한꺼번에 다시 그리기 */
function renderAll() {
  renderOverall();
  renderHint();
  renderSummary();
  renderRows();
  // 추가 폼 닫고 외부 버튼 보이게
  const ch = CHANNELS[currentCh];
  document.getElementById('add-form-container').classList.add('hidden');
  const btn = document.getElementById('add-row-btn');
  btn.classList.remove('hidden');
  btn.textContent = `+ ${ch.recordsLabel} 추가`;
}

/** 종합 카드 — 4채널 한눈에 (표 + 합계 행) */
function renderOverall() {
  const items = Object.keys(CHANNELS).map(key => {
    const ch = CHANNELS[key];
    const rows = dbStore[key];
    if (ch.isCost) {
      const s = ch.summarize(rows);
      return { key, name: ch.name, cls: ch.cls, color: ch.color,
               count: s.totalCount, unit: s.unitLabel, cost: s.totalCost, isCost: true };
    }
    return { key, name: ch.name, cls: ch.cls, color: ch.color,
             count: rows.length, unit: '건', cost: null, isCost: false };
  });

  const totalCost  = items.reduce((s,it) => s + (it.cost || 0), 0);
  const totalCount = items.reduce((s,it) => s + it.count, 0);

  const rowsHTML = items.map(it => `
    <div class="flex items-center justify-between py-1.5 ${it.key === currentCh ? 'bg-gray-50 -mx-2 px-2 rounded-md' : ''}">
      <div class="flex items-center gap-2 min-w-0">
        <span class="ch-dot" style="background:${it.color}"></span>
        <span class="text-sm text-gray-700 truncate">${it.name}</span>
      </div>
      <div class="flex items-baseline gap-3 shrink-0">
        <span class="text-sm text-gray-500 num-mono">${formatWon(it.count)}${it.unit}</span>
        <span class="text-sm font-semibold num-mono w-24 text-right ${it.isCost ? 'text-red-600' : 'text-gray-300'}">
          ${it.isCost ? '₩'+formatWon(it.cost) : '–'}
        </span>
      </div>
    </div>
  `).join('');

  document.getElementById('overall-card').innerHTML = `
    <div class="mb-2">
      <div class="text-sm font-semibold text-gray-800">전체 종합</div>
    </div>
    ${rowsHTML}
    <div class="border-t border-gray-100 mt-2 pt-2 flex items-center justify-between">
      <span class="text-sm font-semibold text-gray-800">총 매입 합계</span>
      <div class="flex items-baseline gap-3">
        <span class="text-sm text-gray-600 num-mono">${formatWon(totalCount)}건</span>
        <span class="text-base font-bold text-red-600 num-mono w-24 text-right">₩${formatWon(totalCost)}</span>
      </div>
    </div>
  `;
}

/** 힌트 카드 (채널색 라이트톤) */
function renderHint() {
  const ch = CHANNELS[currentCh];
  const card = document.getElementById('hint-card');
  card.style.background    = ch.bgLight;
  card.style.borderColor   = ch.borderLight;
  card.style.color         = ch.textDark;
  document.getElementById('hint-text').innerHTML = ch.hint;
}

/** 합계 카드 (선택 채널) */
function renderSummary() {
  const ch   = CHANNELS[currentCh];
  const rows = dbStore[currentCh];
  const card = document.getElementById('summary-card');
  card.style.borderLeftColor = ch.color;

  if (ch.isCost) {
    const s = ch.summarize(rows);
    card.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <span class="badge badge-${ch.cls}">${ch.name}</span>
        <span class="text-sm font-semibold text-gray-700">합계</span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-xs text-gray-500 mb-0.5">총비용</div>
          <div class="text-xl font-bold text-red-600 num-mono">₩${formatWon(s.totalCost)}</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 mb-0.5">평균단가</div>
          <div class="text-xl font-bold text-gray-900 num-mono">₩${formatWon(s.avgUnit)}</div>
        </div>
      </div>
      <div class="text-xs text-gray-500 mt-3 pt-3 border-t border-gray-100 flex justify-between">
        <span>${rows.length}개 ${ch.recordsLabel}</span>
        <span>총 ${formatWon(s.totalCount)}${s.unitLabel}</span>
      </div>
    `;
  } else {
    const s = ch.summarize(rows);
    card.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <span class="badge badge-${ch.cls}">${ch.name}</span>
        <span class="text-sm font-semibold text-gray-700">영업기회</span>
      </div>
      <div class="flex items-baseline gap-2">
        <div class="text-3xl font-bold text-purple-700 num-mono">${s.count}</div>
        <div class="text-base text-gray-700">건</div>
      </div>
    `;
  }
}

/** 한국 콤마 형식 */
function formatWon(n) {
  if (n === null || n === undefined || n === '') return '0';
  return Math.round(Number(n)||0).toLocaleString('ko-KR');
}

/** 행 리스트 */
function renderRows() {
  const ch   = CHANNELS[currentCh];
  const rows = dbStore[currentCh];
  document.getElementById('row-count-label').textContent = ch.recordsLabel;

  const list = document.getElementById('row-list');
  if (rows.length === 0) {
    list.innerHTML = `<div class="bg-white rounded-xl p-6 text-center text-sm text-gray-400 border border-dashed border-gray-200">아직 ${ch.recordsLabel}이 없습니다</div>`;
    return;
  }
  list.innerHTML = rows.map((r, i) => renderRow(r, i, i === expandedIdx)).join('');
}

/** 행 1개 — 접힘 / 펼침 */
function renderRow(row, idx, expanded) {
  const ch = CHANNELS[currentCh];
  const displayNum = String(idx + 1).padStart(2, '0'); // 01, 02, ...

  // ----- 접힘 -----
  if (!expanded) {
    const s = makeRowSummary(row);
    let rightHTML = '';
    if (s.right) {
      rightHTML = `<div class="text-sm font-bold ${ch.isCost ? 'text-red-600' : 'text-gray-900'} shrink-0 num-mono">${s.right}</div>`;
    } else if (s.rightBadge) {
      rightHTML = `<span class="badge badge-${ch.cls} shrink-0">${s.rightBadge}</span>`;
    }
    return `
      <div class="row-card flex items-center gap-2.5" onclick="expandRow(${idx})">
        <span class="row-num shrink-0">${displayNum}</span>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-gray-900 truncate">${escapeHtml(s.title)}</div>
          <div class="text-xs text-gray-500 truncate mt-0.5">${escapeHtml(s.sub)}</div>
        </div>
        ${rightHTML}
        <span class="text-gray-300 text-lg shrink-0 leading-none">›</span>
      </div>
    `;
  }

  // ----- 펼침 -----
  return `
    <div class="row-card expanded">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="row-num">${displayNum}</span>
          <span class="badge badge-${ch.cls}">${ch.name}</span>
        </div>
        <button onclick="collapseRow()" class="text-gray-400 hover:text-gray-700 text-xl w-8 h-8 leading-none" aria-label="접기">×</button>
      </div>
      ${renderFieldsForm(row, idx)}
      <div class="flex gap-2 mt-3">
        <button onclick="deleteRow(${idx})" class="px-4 py-2.5 text-red-600 border border-red-200 rounded-lg text-sm font-medium hover:bg-red-50 transition-colors">🗑 삭제</button>
        <button onclick="saveRow(${idx})" class="flex-1 px-4 py-2.5 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 transition-colors">💾 저장</button>
      </div>
    </div>
  `;
}

/** 접힘 한 줄 요약 (채널별) */
function makeRowSummary(row) {
  if (currentCh === 'purchase') {
    const cost = (Number(row.개당단가)||0) * (Number(row.주문개수)||0);
    return {
      title: row.업체명 || '(이름 없음)',
      sub:   `${row.구매일 || '-'} · ${formatWon(row.개당단가)}원 × ${row.주문개수||0}건`,
      right: `₩${formatWon(cost)}`
    };
  }
  if (currentCh === 'direct') {
    return {
      title: row.소재 || '(소재 없음)',
      sub:   `${row.날짜 || '-'} · ${row.생산개수||0}건`,
      right: `₩${formatWon(row.기간예산)}`
    };
  }
  if (currentCh === 'banner') {
    const cost = (Number(row.개당단가)||0) * (Number(row.주문개수)||0);
    return {
      title: row.업체명 || '(이름 없음)',
      sub:   `${row.날짜 || '-'} 발주 · ${row.도착일 || '-'} 도착 · ${row.주문개수||0}장`,
      right: `₩${formatWon(cost)}`
    };
  }
  return {
    title: `${row.대표자명 || '-'} · ${row.업체명 || '-'}`,
    sub:   `${row.접수일 || '-'} · ${row.소개처 || ''}${row.조건 ? ' · ' + row.조건 : ''}`,
    rightBadge: row.구분
  };
}

/** 폼 (편집/추가 공용) */
function renderFieldsForm(row, idx) {
  const ch = CHANNELS[currentCh];
  const formId = (idx === null || idx === undefined) ? 'add-form' : `edit-form-${idx}`;

  const fields = ch.fields.map(f => {
    const id  = `${formId}-${f.key}`;
    const val = row[f.key] ?? '';
    const colSpan = f.span === 2 ? 'col-span-2' : '';

    // 자동계산 컬럼
    if (f.formula) {
      const calcVal = f.calc(row);
      return `
        <div class="${colSpan}">
          <label class="field-label">
            <span>${f.label}</span>
            <span class="auto-label">🔒 자동</span>
          </label>
          <input id="${id}" data-key="${f.key}" type="text" disabled
                 class="field-input auto-field num-mono"
                 value="${calcVal ? formatWon(calcVal) + (f.unit ? ' ' + f.unit : '') : '-'}">
        </div>`;
    }

    // 셀렉트
    if (f.type === 'select') {
      return `
        <div class="${colSpan}">
          <label class="field-label">${f.label}</label>
          <select id="${id}" data-key="${f.key}" class="field-input" onchange="recalcFormulas('${formId}')">
            ${f.options.map(o => `<option value="${o}" ${o === val ? 'selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>`;
    }

    // 일반 input (text / number / date)
    return `
      <div class="${colSpan}">
        <label class="field-label">
          <span>${f.label}${f.unit ? ` <span class="text-gray-300">(${f.unit})</span>` : ''}</span>
        </label>
        <input id="${id}" data-key="${f.key}" type="${f.type}"
               class="field-input ${f.type === 'number' ? 'num-mono' : ''}"
               value="${val !== '' ? escapeAttr(String(val)) : ''}"
               ${f.placeholder ? `placeholder="${f.placeholder}"` : ''}
               ${f.type === 'number' ? 'inputmode="numeric"' : ''}
               oninput="recalcFormulas('${formId}')">
      </div>`;
  }).join('');

  return `<div class="grid grid-cols-2 gap-2.5">${fields}</div>`;
}

/** 입력 변경 시 수식 컬럼 실시간 갱신 */
function recalcFormulas(formId) {
  const ch = CHANNELS[currentCh];
  const data = {};
  ch.fields.forEach(f => {
    if (f.formula) return;
    const el = document.getElementById(`${formId}-${f.key}`);
    if (!el) return;
    data[f.key] = (f.type === 'number') ? (Number(el.value) || 0) : el.value;
  });
  ch.fields.filter(f => f.formula).forEach(f => {
    const el = document.getElementById(`${formId}-${f.key}`);
    if (!el) return;
    const v = f.calc(data);
    el.value = v ? `${formatWon(v)}${f.unit ? ' ' + f.unit : ''}` : '-';
  });
}

/** 행 펼치기 */
function expandRow(idx) {
  expandedIdx = idx;
  addFormOpen = false;
  document.getElementById('add-form-container').classList.add('hidden');
  const btn = document.getElementById('add-row-btn');
  btn.classList.remove('hidden');
  btn.textContent = `+ ${CHANNELS[currentCh].recordsLabel} 추가`;
  renderRows();
  setTimeout(() => {
    document.querySelectorAll('.row-card.expanded')[0]
      ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function collapseRow() {
  expandedIdx = -1;
  renderRows();
}

/** 저장 */
function saveRow(idx) {
  const ch  = CHANNELS[currentCh];
  const row = dbStore[currentCh][idx];
  const formId = `edit-form-${idx}`;
  ch.fields.forEach(f => {
    if (f.formula) return;
    const el = document.getElementById(`${formId}-${f.key}`);
    if (!el) return;
    row[f.key] = (f.type === 'number') ? (Number(el.value) || 0) : el.value;
  });
  expandedIdx = -1;
  renderAll();
  showToast('저장되었습니다 📌');
}

/** 삭제 — iframe 환경에서 native confirm()이 차단되므로 커스텀 모달 사용 */
async function deleteRow(idx) {
  const ch = CHANNELS[currentCh];
  const row = dbStore[currentCh][idx];
  const label = row.업체명 || row.소재 || row.대표자명 || `${String(idx+1).padStart(2,'0')}번`;
  const ok = await customConfirm(
    `${ch.recordsLabel} 삭제`,
    `'${label}' 을(를) 삭제할까요?`
  );
  if (!ok) return;
  dbStore[currentCh].splice(idx, 1);
  expandedIdx = -1;
  renderAll();
  showToast('삭제되었습니다 🗑');
}

/** 커스텀 confirm — components.md Alert 패턴 (Promise 반환) */
function customConfirm(title, message) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[300] p-4';
    overlay.style.animation = 'fadeIn 0.15s ease';
    overlay.innerHTML = `
      <div class="bg-white rounded-xl p-5 max-w-sm w-full shadow-xl">
        <h3 class="font-semibold text-gray-900 text-base mb-1">${escapeHtml(title)}</h3>
        <p class="text-gray-600 text-sm mb-4 leading-relaxed">${escapeHtml(message)}</p>
        <div class="flex gap-2">
          <button data-action="cancel" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50">취소</button>
          <button data-action="ok" class="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-semibold">삭제</button>
        </div>
      </div>
    `;
    const close = (result) => { overlay.remove(); resolve(result); };
    overlay.querySelector('[data-action="cancel"]').onclick = () => close(false);
    overlay.querySelector('[data-action="ok"]').onclick     = () => close(true);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(false); });
    document.body.appendChild(overlay);
  });
}

/** 추가 폼 열기 */
function openAddForm() {
  addFormOpen = true;
  expandedIdx = -1;
  document.getElementById('add-row-btn').classList.add('hidden');
  document.getElementById('add-form-container').classList.remove('hidden');
  renderAddForm();
  renderRows();
  setTimeout(() => {
    document.getElementById('add-form-container')
      .scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

/** 추가 폼 닫기 */
function closeAddForm() {
  addFormOpen = false;
  document.getElementById('add-form-container').classList.add('hidden');
  const btn = document.getElementById('add-row-btn');
  btn.classList.remove('hidden');
  btn.textContent = `+ ${CHANNELS[currentCh].recordsLabel} 추가`;
}

/** 추가 폼 본문 */
function renderAddForm() {
  const ch = CHANNELS[currentCh];
  const today = new Date().toISOString().slice(0, 10);
  const blank = {};
  ch.fields.forEach(f => {
    if (f.type === 'date')        blank[f.key] = today;
    else if (f.type === 'number') blank[f.key] = '';
    else if (f.type === 'select') blank[f.key] = f.options[0];
    else                          blank[f.key] = '';
  });

  document.getElementById('add-form-container').innerHTML = `
    <div class="flex items-center gap-2 mb-3">
      <span class="badge badge-${ch.cls}">${ch.name}</span>
      <span class="text-sm font-semibold text-gray-700">${ch.recordsLabel} 추가</span>
    </div>
    ${renderFieldsForm(blank, null)}
    <div class="flex gap-2 mt-3">
      <button onclick="closeAddForm()" class="px-4 py-2.5 text-gray-600 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50">취소</button>
      <button onclick="addRow()" class="flex-1 px-4 py-2.5 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600">+ 추가</button>
    </div>
  `;
}

/** 추가 폼 → store에 push */
function addRow() {
  const ch = CHANNELS[currentCh];
  const newRow = {};
  ch.fields.forEach(f => {
    if (f.formula) return;
    const el = document.getElementById(`add-form-${f.key}`);
    if (!el) return;
    newRow[f.key] = (f.type === 'number') ? (Number(el.value) || 0) : el.value;
  });
  const last = dbStore[currentCh].slice(-1)[0];
  newRow.rowNum = last ? last.rowNum + 1 : 2; // 시트 동기화용 (UI에는 안 보임)
  dbStore[currentCh].push(newRow);
  addFormOpen = false;
  renderAll();
  showToast(`${ch.recordsLabel}이 추가되었습니다 ✨`);
}

/** 토스트 */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/** HTML 이스케이프 */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) {
  return String(s ?? '').replace(/"/g, '&quot;');
}

// =============================================================
// [STEP 4/4] 초기 렌더
// =============================================================
renderAll();
</script>
