services:
  app:
    build: .
    image: salespt-log:latest
    container_name: salespt-log
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: salespt-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
